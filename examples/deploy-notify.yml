# Deploy — drop this into .github/workflows/ in any repo.
# Replace YOUR_ORG/github-actions with your actual shared-workflows repo.
# Optional secret: DISCORD_WEBHOOK

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: YOUR_ORG/github-actions/.github/workflows/deploy.yml@main
    with:
      environment: production
      deploy-command: 'npm run deploy'          # replace with your deploy command
      app-url: 'https://your-app.example.com'  # optional
      commit-msg: ${{ github.event.head_commit.message }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
